  <!-- CRITICAL: Lock scroll position before ANY framework code loads -->
  <script>
    // Immediately force scroll to top before anything else runs
    (function () {
      // Lock scroll restoration
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }

      // Force scroll to top immediately
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      if (document.body) {
        document.body.scrollTop = 0;
      }

      // Keep forcing scroll to top during page load
      var scrollLockInterval = setInterval(function () {
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        if (document.body) {
          document.body.scrollTop = 0;
        }
      }, 10);

      // Stop forcing after page is fully loaded
      window.addEventListener('load', function () {
        setTimeout(function () {
          clearInterval(scrollLockInterval);
        }, 2000); // Keep locked for 2 seconds after load to ensure animations complete
      });
    })();
  </script>
